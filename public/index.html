<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TTC NZ" />
    <title>TTC Niederzeuzheim – Trainingsheft</title>
    <style>
      :root {
        --bg: #0d1117; --bg2: #111827; --bg3: #1f2937;
        --border: #1f2937; --border2: #374151;
        --text: #e5e7eb; --text2: #9ca3af; --text3: #6b7280; --text4: #4b5563;
        --input-bg: #0d1117; --sel-bg: #0d1117;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); }
      /* Light mode card backgrounds */
      .light-card { background: #ffffff; border-color: #e5e7eb; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
